name: CI

on: push

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # next-env.d.ts is generated, not committed (Next 16 convention);
      # typegen creates it plus the route types tsc needs on a fresh checkout.
      - name: Generate types
        run: npx next typegen

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Content schema validation
        run: npm run validate

      - name: Production build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Smoke tests
        run: npx playwright test

      - name: Lighthouse CI
        run: npx lhci autorun
